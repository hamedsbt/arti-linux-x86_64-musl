name: release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: arti-aarch64-musl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64-musl toolchain (musl.cc)
        run: |
          wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
          sudo tar xzf aarch64-linux-musl-cross.tgz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "CC_aarch64_unknown_linux_musl=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_musl=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-ar" >> $GITHUB_ENV

      - name: Build SQLite (static, musl)
        run: |
          cd /tmp
          wget -q https://www.sqlite.org/2024/sqlite-autoconf-3460100.tar.gz
          tar xzf sqlite-autoconf-3460100.tar.gz
          cd sqlite-autoconf-3460100
          CC=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc \
          AR=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-ar \
          RANLIB=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-ranlib \
          ./configure \
            --host=aarch64-linux-musl \
            --prefix=/opt/aarch64-linux-musl-cross/aarch64-linux-musl \
            --enable-static --disable-shared
          make -j$(nproc)
          sudo make install

      - name: Build OpenSSL (static, musl, no async)
        run: |
          cd /tmp
          wget -q https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xzf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          CC=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc \
          AR=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-ar \
          RANLIB=/opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-ranlib \
          ./Configure linux-aarch64 \
            no-shared \
            no-async \
            --prefix=/opt/aarch64-linux-musl-cross/aarch64-linux-musl \
            --openssldir=/opt/aarch64-linux-musl-cross/aarch64-linux-musl/ssl
          make -j$(nproc)
          sudo make install

      - name: Set environment variables
        run: |
          echo "OPENSSL_DIR=/opt/aarch64-linux-musl-cross/aarch64-linux-musl" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=/opt/aarch64-linux-musl-cross/aarch64-linux-musl/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=/opt/aarch64-linux-musl-cross/aarch64-linux-musl/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build arti (default features)
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p arti

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/arti dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
          file dist/${{ matrix.name }}
          ldd dist/${{ matrix.name }} || echo "Fully static binary"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List files
        run: find dist -type f
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/arti-aarch64-musl
          generate_release_notes: true
