name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arti-aarch64-musl
            docker_tag: aarch64-musl-nightly   # known working tag

    steps:
      - uses: actions/checkout@v4

      - name: Build in blackdex/rust-musl container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/volume \
            -w /volume \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            blackdex/rust-musl:${{ matrix.docker_tag }} \
            cargo build --release --target ${{ matrix.target }} -p arti

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename binary
        run: |
          mv dist/arti dist/arti-aarch64-musl
          chmod +x dist/arti-aarch64-musl
          file dist/arti-aarch64-musl

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/arti-aarch64-musl
          generate_release_notes: true
