name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arti-linux-aarch64-musl
            docker_tag: aarch64-musl-nightly

    steps:
      - uses: actions/checkout@v4

      - name: Build in blackdex/rust-musl container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/volume \
            -w /volume \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            blackdex/rust-musl:${{ matrix.docker_tag }} \
            cargo build --release \
              --target ${{ matrix.target }} \
              -p arti \
              --features=full

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armv7-linux-androideabi
            name: arti-android-armv7
            ndk_arch: arm
            api: 30
          - target: aarch64-linux-android
            name: arti-android-arm64
            ndk_arch: arm64
            api: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with cargo-ndk (full features)
        run: |
          cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.api }} \
            build --release -p arti --features=full

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  release:
    needs: [build-musl, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare binaries
        run: |
          chmod +x dist/* || true
          # Rename to include platform in name
          for f in dist/*; do
            if [[ "$f" == *"arti-linux-aarch64-musl"* ]]; then
              mv "$f" dist/arti-linux-aarch64-musl
            elif [[ "$f" == *"arti-android-armv7"* ]]; then
              mv "$f" dist/arti-android-armv7
            elif [[ "$f" == *"arti-android-arm64"* ]]; then
              mv "$f" dist/arti-android-arm64
            fi
          done
          ls -la dist/

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
