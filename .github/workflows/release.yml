name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arti-linux-aarch64-musl
            docker_tag: aarch64-musl-nightly

    steps:
      - uses: actions/checkout@v4

      - name: Build in blackdex/rust-musl container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/volume \
            -w /volume \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            blackdex/rust-musl:${{ matrix.docker_tag }} \
            cargo build --release \
              --target ${{ matrix.target }} \
              -p arti \
              --features=full

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armv7-linux-androideabi
            name: arti-android-armv7
            api: 30
            openssl_arch: android-arm
          - target: aarch64-linux-android
            name: arti-android-arm64
            api: 30
            openssl_arch: android-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r26d

      - name: Build OpenSSL for Android
        run: |
          cd /tmp
          wget https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xzf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          
          # Set the appropriate CC for each architecture
          if [ "${{ matrix.target }}" = "armv7-linux-androideabi" ]; then
            export CC=armv7a-linux-androideabi${{ matrix.api }}-clang
          else
            export CC=aarch64-linux-android${{ matrix.api }}-clang
          fi
          
          ./Configure ${{ matrix.openssl_arch }} \
            no-shared \
            --prefix=$ANDROID_NDK_HOME/sysroot/usr \
            --openssldir=$ANDROID_NDK_HOME/sysroot/usr/ssl
          
          make -j$(nproc)
          make install
          
          echo "OPENSSL_DIR=$ANDROID_NDK_HOME/sysroot/usr" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with cargo-ndk (default features)
        run: |
          cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.api }} \
            build --release -p arti

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  release:
    needs: [build-musl, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare binaries
        run: |
          cd dist
          chmod +x * || true
          
          # Rename files to have clean names
          for f in *; do
            case "$f" in
              *"arti-linux-aarch64-musl"*)
                mv "$f" arti-linux-aarch64-musl
                ;;
              *"arti-android-armv7"*)
                mv "$f" arti-android-armv7
                ;;
              *"arti-android-arm64"*)
                mv "$f" arti-android-arm64
                ;;
            esac
          done
          
          ls -la
          file * || true

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
