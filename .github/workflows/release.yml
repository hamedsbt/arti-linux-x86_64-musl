name: release

env:
  BUILD_AARCH64_MUSL: false
  BUILD_ANDROID_ARM7: true
  BUILD_ANDROID_ARM8: false
  
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: arti-linux-aarch64-musl
            docker_tag: aarch64-musl-nightly
            skip: env.BUILD_AARCH64_MUSL == false

    steps:
      - uses: actions/checkout@v4

      - name: Build in blackdex/rust-musl container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/volume \
            -w /volume \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            blackdex/rust-musl:${{ matrix.docker_tag }} \
            cargo build --release \
              --target ${{ matrix.target }} \
              -p arti \
              --features=full

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: armv7-linux-androideabi
            name: arti-android-armv7
            api: 30
            openssl_arch: android-arm
            ndk_triple: armv7a-linux-androideabi
            skip: env.BUILD_ANDROID_ARM7 == false
          - target: aarch64-linux-android
            name: arti-android-arm64
            api: 30
            openssl_arch: android-arm64
            ndk_triple: aarch64-linux-android
            skip: env.BUILD_ANDROID_ARM7 == false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r26d

      - name: Get NDK path
        run: |
          echo "NDK_PATH=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "TOOLCHAIN_PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Build SQLite for Android
        run: |
          cd /tmp
          wget https://www.sqlite.org/2024/sqlite-autoconf-3460100.tar.gz
          tar xzf sqlite-autoconf-3460100.tar.gz
          cd sqlite-autoconf-3460100
          
          export PATH=$TOOLCHAIN_PATH:$PATH
          export CC=${{ matrix.ndk_triple }}${{ matrix.api }}-clang
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          
          ./configure \
            --host=${{ matrix.ndk_triple }} \
            --prefix=$NDK_PATH/sysroot/usr \
            --enable-static \
            --disable-shared
          
          make -j$(nproc)
          make install
          
          echo "SQLITE3_LIB_DIR=$NDK_PATH/sysroot/usr/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=$NDK_PATH/sysroot/usr/include" >> $GITHUB_ENV

      - name: Build OpenSSL for Android
        run: |
          cd /tmp
          wget https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xzf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          
          export PATH=$TOOLCHAIN_PATH:$PATH
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export CC=${{ matrix.ndk_triple }}${{ matrix.api }}-clang
          
          ./Configure ${{ matrix.openssl_arch }} \
            no-shared \
            --prefix=$NDK_PATH/sysroot/usr \
            --openssldir=$NDK_PATH/sysroot/usr/ssl
          
          make -j$(nproc)
          make install
          
          echo "OPENSSL_DIR=$NDK_PATH/sysroot/usr" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with cargo-ndk
        env:
          OPENSSL_STATIC: 1
          SQLITE3_STATIC: 1
        run: |
          cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.api }} \
            build --release -p arti

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/arti

  release:
    needs: [build-musl, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare binaries
        run: |
          cd dist
          chmod +x * || true
          
          # Rename files to have clean names
          for f in *; do
            case "$f" in
              *"arti-linux-aarch64-musl"*)
                mv "$f" arti-linux-aarch64-musl
                ;;
              *"arti-android-armv7"*)
                mv "$f" arti-android-armv7
                ;;
              *"arti-android-arm64"*)
                mv "$f" arti-android-arm64
                ;;
            esac
          done
          
          ls -la
          file * || true

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
